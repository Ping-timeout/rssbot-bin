name: Build Upstream rssbot

on:
  # Runs automatically every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allows you to trigger the build manually from the Actions tab
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the external repository
      - name: Checkout upstream repo
        uses: actions/checkout@v4
        with:
          repository: iovxw/rssbot
          fetch-depth: 1

      # 2. Install Rust Nightly toolchain
      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      # 3. Cache Cargo registry and build directory to speed up future runs
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 4. Compile the binary
      - name: Build rssbot
        run: cargo build --release

      # 5. Upload the compiled binary to GitHub Actions Artifacts
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rssbot-linux-amd64
          path: target/release/rssbot
          if-no-files-found: error
          retention-days: 90 # Keeps the download link active for 90 days
